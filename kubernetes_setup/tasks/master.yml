---
- name: installing kubectl
  ansible.builtin.apt:
    name: kubectl
    state: present

- name: holding kubectl version
  ansible.builtin.dpkg_selections:
    name: kubectl
    selection: hold
    
- name: checking cluster initialization
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kube_init_exists

- name: kubeadm config generation via template 
  ansible.builtin.template:
    src: kubeadm-config.yaml.j2
    dest: /tmp/kubeadm-config.yaml
  when: not kube_init_exists.stat.exists

- name: initialising the Master
  ansible.builtin.command: kubeadm init --config /tmp/kubeadm-config.yaml
  when: not kube_init_exists.stat.exists
  register: kubeadm_init_result
  changed_when: kubeadm_init_result.rc == 0
  failed_when: kubeadm_init_result.rc != 0

- name: wait for API server to be ready
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 6443
    delay: 10
    timeout: 120
    
- name: .kube creation
  ansible.builtin.file:
    path: "/home/{{ kube_admin_user }}/.kube"
    state: directory
    mode: '0755'
    owner: "{{ kube_admin_user }}"
    group: "{{ kube_admin_user }}"

- name: copying admin.conf to user repos
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ kube_admin_user }}/.kube/config"
    remote_src: yes
    owner: "{{ kube_admin_user }}"
    group: "{{ kube_admin_user }}"
    mode: '0600'

- name: generating Calico manifest
  ansible.builtin.template:
    src: calico.yaml.j2
    dest: /tmp/calico.yaml

- name: applying Calico manifest
  ansible.builtin.command: kubectl apply -f /tmp/calico.yaml
  become: false
  register: calico_result
  changed_when: "'created' in calico_result.stdout or 'configured' in calico_result.stdout"

- name: token generation for Workers
  ansible.builtin.command: kubeadm token create --print-join-command
  register: join_command_raw
  changed_when: false
  no_log: true

- name: sharing join command via hostvars 
  ansible.builtin.set_fact:
    kubernetes_join_command: "{{ join_command_raw.stdout }}"
    cacheable: true
  no_log: true
