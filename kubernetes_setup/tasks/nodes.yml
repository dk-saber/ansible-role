- name: verefying if node has joined the cluster
  stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

- name: Joining Kubernetes cluster 
  command: "{{ hostvars[groups['master'][0]]['kubernetes_join_command'] }}"
  register: join_result
  failed_when: 
    - join_result.rc != 0 
    - "'already exists' not in join_result.stderr"
  when: not kubelet_conf.stat.exists
