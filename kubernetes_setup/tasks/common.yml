- name: disable swap
  command: swapoff -a
  when: ansible_swaptotal_mb > 0

- name: delete swap from fstab file
  mount:
    name: "{{ item }}"
    fstype: swap
    state: absent
  loop: ["none", "swap"]

- name: Charging pre-requisit modules
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: sysctl config for kubernetes
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: /etc/sysctl.d/k8s.conf
    reload: yes
  loop:
    - { key: 'net.bridge.bridge-nf-call-iptables', value: '1' }
    - { key: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
    - { key: 'net.ipv4.ip_forward', value: '1' }

- name: hosts resolution in /etc/hosts
  lineinfile:
    path: /etc/hosts
    line: "{{ ansible_host }} {{ inventory_hostname }}"
    state: present

- name: adding GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc

- name: adding containerd repos
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Installing containerd
  apt:
    name: containerd.io
    state: present
    update_cache: yes

- name: downloding Kubernetes GPG key
  get_url:
    url: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key"
    dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc

- name: adding kubernets {{ k8s_version }} repos
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/{{ k8s_version }}/deb/ /"
    state: present

- name: creating containerd config directory
  file:
    path: /etc/containerd
    state: directory

- name: deploying  containerd config via template
  template:
    src: config.toml.j2
    dest: /etc/containerd/config.toml
  notify: restart containerd

- name: installating (kubelet et kubeadm) packages
  apt:
    name:
      - kubelet
      - kubeadm
    state: present
    update_cache: yes

- name: installing kubectl on Master
  apt:
    name: kubectl
    state: present
  when: inventory_hostname in groups['master']

- name: retrieving installed packages list
  package_facts:
    manager: auto

- name: holding packages version
  dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl
  when: item in ansible_facts.packages
